version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: news-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-news_app}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-169720}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/02-数据库sql文件/database.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: news-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: news-backend
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-news_app}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-169720}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_ECHO: ${DB_ECHO:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-news-app-dev-secret}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
    ports:
      - "8000:8000"

volumes:
  mysql_data:
  redis_data:
